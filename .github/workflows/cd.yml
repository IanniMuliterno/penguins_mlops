name: Model CD

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push-ecr:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.set-uri.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.inference
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.ref_name }}

      - name: Export image URI
        id: set-uri
        run: |
          echo "IMAGE_URI=$IMAGE_URI" \
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.ref_name }}" >> $GITHUB_OUTPUT

  upload-artifacts:
    name: Upload model artifacts to S3
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload artifacts
        run: |
          aws s3 cp model_artifacts/ s3://${{ secrets.S3_BUCKET }}/models/${{ github.ref_name }}/ --recursive

  register-model:
    name: Register model in SageMaker Model Registry
    runs-on: ubuntu-latest
    needs: [build-and-push-ecr, upload-artifacts]
    permissions:
      id-token: write
      contents: read
    outputs:
      model_package_arn: ${{ steps.register.outputs.model_package_arn }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Register model package
        id: register
        env:
          IMAGE_URI: ${{ needs.build-and-push-ecr.outputs.image_uri }}
        run: |
          echo "IMAGE_URI=$IMAGE_URI" && \
          ARN=$(aws sagemaker create-model-package \
            --model-package-group-name ${{ secrets.MODEL_PACKAGE_GROUP }} \
            --model-package-description "Penguin classifier ${{ github.ref_name }}" \
            --inference-specification "{
              \"Containers\": [{
                \"Image\": \"${IMAGE_URI}\",
                \"ModelDataUrl\": \"s3://${{ secrets.S3_BUCKET }}/models/${{ github.ref_name }}/penguin_classifier_model.skops\"
              }],
              \"SupportedContentTypes\": [\"text/csv\"],
              \"SupportedResponseMIMETypes\": [\"application/json\"]
            }" \
            --model-approval-status "Approved" \
            --query "ModelPackageArn" \
            --output text)
          echo "model_package_arn=${ARN}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to SageMaker endpoint
    runs-on: ubuntu-latest
    needs: register-model
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install boto3
        run: pip install boto3

      - name: Deploy endpoint
        env:
          MODEL_PACKAGE_ARN: ${{ needs.register-model.outputs.model_package_arn }}
          ENDPOINT_NAME: ${{ secrets.SAGEMAKER_ENDPOINT_NAME }}
          EXECUTION_ROLE: ${{ secrets.SAGEMAKER_EXECUTION_ROLE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          MODEL_VERSION: ${{ github.ref_name }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: python scripts/deploy_endpoint.py

  monitoring:
    name: Configure SageMaker Model Monitor
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install boto3 sagemaker palmerpenguins pandas

      - name: Setup monitoring
        env:
          ENDPOINT_NAME: ${{ secrets.SAGEMAKER_ENDPOINT_NAME }}
          EXECUTION_ROLE: ${{ secrets.SAGEMAKER_EXECUTION_ROLE }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python scripts/setup_monitoring.py
