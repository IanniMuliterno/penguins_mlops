name: Model CD

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build_and_push_ecr:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.inference
          push: true
          tags: ${{ steps.login_ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.ref_name }}

  upload_artifacts:
    name: Upload model artifacts to S3
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Pull DVC artifacts
        run: uv run dvc pull

      - name: verify required artifacts
        run: |
          test -f model_artifacts/penguin_classifier_model.skops
          test -f model_artifacts/feature_names.json

      - name: Package model artifacts
        run: |
          tar -czf model.tar.gz -C model_artifacts penguin_classifier_model.skops feature_names.json

      - name: Upload artifacts
        run: |
          aws s3 cp model.tar.gz s3://${{ secrets.S3_BUCKET }}/models/${{ github.ref_name }}/model.tar.gz

  register_model:
    name: Register model in SageMaker Model Registry
    runs-on: ubuntu-latest
    needs: [build_and_push_ecr, upload_artifacts]
    permissions:
      id-token: write
      contents: read
    outputs:
      model_package_arn: ${{ steps.register.outputs.model_package_arn }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Compute IMAGE_URI
        id: image_uri
        run: |
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ github.ref_name }}"
            echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
            echo "IMAGE_URI=$IMAGE_URI"
      - name: Register model package
        id: register
        env:
          IMAGE_URI: ${{ steps.image_uri.outputs.image_uri }}
        run: |
          ARN=$(aws sagemaker create-model-package \
            --model-package-group-name ${{ secrets.MODEL_PACKAGE_GROUP }} \
            --model-package-description "Penguin classifier ${{ github.ref_name }}" \
            --inference-specification "{
              \"Containers\": [{
                \"Image\": \"${IMAGE_URI}\",
                \"ModelDataUrl\": \"s3://${{ secrets.S3_BUCKET }}/models/${{ github.ref_name }}/model.tar.gz\"
              }],
              \"SupportedContentTypes\": [\"text/csv\"],
              \"SupportedResponseMIMETypes\": [\"application/json\"]
            }" \
            --model-approval-status "Approved" \
            --query "ModelPackageArn" \
            --output text)
          echo "model_package_arn=${ARN}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to SageMaker endpoint
    runs-on: ubuntu-latest
    needs: register_model
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install boto3
        run: pip install boto3

      - name: Deploy endpoint
        env:
          MODEL_PACKAGE_ARN: ${{ needs.register_model.outputs.model_package_arn }}
          ENDPOINT_NAME: ${{ secrets.SAGEMAKER_ENDPOINT_NAME }}
          EXECUTION_ROLE: ${{ secrets.SAGEMAKER_EXECUTION_ROLE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          MODEL_VERSION: ${{ github.ref_name }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: python scripts/deploy_endpoint.py

  monitoring:
    name: Configure SageMaker Model Monitor
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install boto3 sagemaker palmerpenguins pandas

      - name: Setup monitoring
        env:
          ENDPOINT_NAME: ${{ secrets.SAGEMAKER_ENDPOINT_NAME }}
          EXECUTION_ROLE: ${{ secrets.SAGEMAKER_EXECUTION_ROLE }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python scripts/setup_monitoring.py
