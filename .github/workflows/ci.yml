name: Model's CI


on:
    push:
        branches:
            - main
            - dev
    
    pull_request:
        branches:
            - main
            - dev


jobs:
    tests:
        name: CI
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'
            
            - name: install uv
              uses: astral-sh/setup-uv@v4
            
            - name: install dependencies
              run: |
                uv sync

            - name: runs python tests
              run: |
                uv run pytest tests/ -v